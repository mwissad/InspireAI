# ═══════════════════════════════════════════════════════════════
#  Inspire AI — Databricks App Configuration
# ═══════════════════════════════════════════════════════════════
#
#  DEPLOYMENT (Git-backed):
#    1. Go to your Databricks workspace → Compute → Apps
#    2. Click "Create App"
#    3. Choose "Create from Git repository"
#    4. Paste the GitHub URL of this repo
#    5. Set app name to "inspire-ai"
#    6. Click "Create" — Databricks handles the rest
#
#  The runtime automatically injects:
#    DATABRICKS_HOST  → workspace URL (e.g. https://adb-xxx.azuredatabricks.net)
#    DATABRICKS_TOKEN → service principal token (if resource configured)
#    PORT             → port the app must listen on
#
# ═══════════════════════════════════════════════════════════════

command:
  - "bash"
  - "start.sh"

env:
  - name: "NODE_ENV"
    value: "production"

# Service principal — the Databricks App runtime generates an OAuth token
# and injects it as DATABRICKS_TOKEN env var automatically.
resources:
  - name: "inspire-ai-sp"
    type: "service-principal"
